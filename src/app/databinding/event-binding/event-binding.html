<div class="container">
    <div class="card">
      <h2>Event Binding</h2>
      <button (click)="onClick()">Click Me</button>
      <p>{{ clickMessage }}</p>
      <hr style="margin: 12px 0;">
      <button (click)="increment()">Increment</button>
      <button (click)="reset()">Reset</button>
      <p>Counter: {{ counter }}</p>
    </div>
  </div>
